<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Peak150 - Comissionamento</title>
<style>
body { font-family: Arial; margin:0; background:#111; color:#eee; }
header { background:#222; padding:10px; text-align:center; font-weight:bold; }
.tabs { display:flex; flex-wrap:wrap; background:#333; }
.tabs button { flex:1; padding:10px; background:#333; color:#fff; border:none; cursor:pointer; }
.tabs button:hover { background:#555; }
.tab { display:none; padding:15px; }
.active { display:block; }
.card { background:#222; padding:10px; margin:10px 0; border-radius:8px; }
input { width:100%; padding:10px; margin:10px 0; }
</style>
</head>

<body>

<header>APP PEAK150 - COMISSIONAMENTO</header>

<div class="tabs">
<button onclick="openTab('busca')">🔎 Busca</button>
<button onclick="openTab('config')">📟 Configurador</button>
<button onclick="openTab('backup')">📊 Backup</button>
<button onclick="openTab('cpc')">⚙️ CPC</button>
<button onclick="openTab('gloss')">📚 Glossário</button>
</div>

<div id="busca" class="tab active">
<h2>Busca Inteligente</h2>
<input type="text" id="search" placeholder="Digite algo..." onkeyup="buscar()">
<div id="resultado"></div>
</div>

<div id="config" class="tab">
<h2>Configurador</h2>
<div id="configList"></div>
</div>

<div id="backup" class="tab">
<h2>Comparação de Backup</h2>
<button onclick="comparar()">Comparar Exemplo</button>
<div id="diff"></div>
</div>

<div id="cpc" class="tab">
<h2>CPC</h2>
<div id="cpcList"></div>
</div>

<div id="gloss" class="tab">
<h2>Glossário</h2>
<div id="glossList"></div>
</div>

<script>

function openTab(tab){
 document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
 document.getElementById(tab).classList.add('active');
}

// BANCO
const banco = [
 {nome:"MPU Max Hertz", descricao:"Frequência do sensor", valor:5333},
 {nome:"Overspeed", descricao:"Limite de velocidade", valor:7150},
];

// BUSCA
function buscar(){
 let q = document.getElementById("search").value.toLowerCase();
 let res = banco.filter(p => p.nome.toLowerCase().includes(q) || p.descricao.toLowerCase().includes(q));

 let out = "";
 res.forEach(r=>{
   out += `<div class="card"><b>${r.nome}</b><br>${r.descricao}<br>Valor: ${r.valor}</div>`;
 });

 if(out === "") out = "🤖 IA responderia aqui...";
 document.getElementById("resultado").innerHTML = out;
}

// CONFIGURADOR
const configurador = [
 {nome:"MPU Max Hertz", caminho:"MENU > SPEED > MPU", risco:"Overspeed"},
];

configurador.forEach(c=>{
 document.getElementById("configList").innerHTML += 
 `<div class="card"><b>${c.nome}</b><br>${c.caminho}<br>⚠️ ${c.risco}</div>`;
});

// BACKUP
function comparar(){
 let base = {mpu:5333, speed:7150};
 let novo = {mpu:5200, speed:7100};

 let out = "";
 for(let k in base){
  if(base[k] !== novo[k]){
    out += `<div class="card">${k}: ${base[k]} → ${novo[k]}</div>`;
  }
 }
 document.getElementById("diff").innerHTML = out;
}

// CPC
const cpc = [
 {nome:"Válvula", funcao:"Controla fluxo"},
 {nome:"MPU", funcao:"Mede velocidade"}
];

cpc.forEach(c=>{
 document.getElementById("cpcList").innerHTML += 
 `<div class="card"><b>${c.nome}</b><br>${c.funcao}</div>`;
});

// GLOSSARIO
const gloss = [
 {termo:"MPU", desc:"Sensor de velocidade"},
 {termo:"Trip", desc:"Desarme"}
];

gloss.forEach(g=>{
 document.getElementById("glossList").innerHTML += 
 `<div class="card"><b>${g.termo}</b><br>${g.desc}</div>`;
});

</script>

</body>
</html>
